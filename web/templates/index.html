<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日线数据查看</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #1a2332;
            margin-bottom: 20px;
        }

        .header .sub {
            color: #6a7a8e;
            font-size: 13px;
        }

        .header .status {
            font-size: 12px;
            color: #6a7a8e;
        }

        .controls {
            background: #111927;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1a2332;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: end;
        }

        .controls .group {
            flex: 1;
            min-width: 150px;
        }

        .controls label {
            display: block;
            font-size: 11px;
            color: #6a7a8e;
            margin-bottom: 4px;
        }

        .controls input,
        .controls select {
            width: 100%;
            padding: 8px 12px;
            background: #0d1421;
            border: 1px solid #1a2332;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
        }

        .controls input:focus,
        .controls select:focus {
            outline: none;
            border-color: #f0b90b;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 150px;
        }

        .search-wrapper input {
            width: 100%;
            padding: 8px 12px;
            background: #0d1421;
            border: 1px solid #1a2332;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
        }

        .search-wrapper input:focus {
            outline: none;
            border-color: #f0b90b;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #111927;
            border: 1px solid #1a2332;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .suggestions .item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #1a2332;
            font-size: 13px;
        }

        .suggestions .item:hover {
            background: #1a2332;
        }

        .suggestions .item .code {
            color: #f0b90b;
            font-weight: 600;
        }

        .suggestions .item .name {
            color: #6a7a8e;
            margin-left: 10px;
        }

        .suggestions .no-result {
            padding: 12px;
            color: #6a7a8e;
            text-align: center;
        }

        .btn {
            padding: 8px 28px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(135deg, #f0b90b, #d4a008);
            color: #0a0e17;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(240, 185, 11, 0.3);
        }

        .btn-sm {
            padding: 6px 16px;
            font-size: 12px;
        }

        .btn-secondary {
            background: #1a2332;
            color: #e0e0e0;
        }

        .btn-secondary:hover {
            background: #24344a;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            background: #0d1421;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #1a2332;
        }

        .action-bar .label {
            font-size: 12px;
            color: #6a7a8e;
            margin-right: 8px;
        }

        .action-bar .log-box {
            flex: 1;
            min-width: 200px;
            max-height: 150px;
            overflow-y: auto;
            background: #0a0e17;
            border-radius: 6px;
            padding: 8px 12px;
            font-family: monospace;
            font-size: 12px;
            color: #6a7a8e;
            border: 1px solid #1a2332;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .action-bar .log-box .log-success {
            color: #00c853;
        }

        .action-bar .log-box .log-error {
            color: #ff1744;
        }

        .action-bar .log-box .log-info {
            color: #f0b90b;
        }

        #limitUpArea,
        #tacticsArea,
        #combinedArea {
            background: #111927;
            border-radius: 12px;
            border: 1px solid #1a2332;
            margin-bottom: 20px;
            padding: 15px;
        }

        #limitUpArea .header-row,
        #tacticsArea .header-row,
        #combinedArea .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        #limitUpArea .header-row span,
        #tacticsArea .header-row span,
        #combinedArea .header-row span {
            font-weight: 600;
            color: #f0b90b;
        }

        #tacticsSearchInput,
        #combinedSearchInput {
            width: 100%;
            padding: 6px 12px;
            background: #0d1421;
            border: 1px solid #1a2332;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
        }

        #tacticsSearchInput:focus,
        #combinedSearchInput:focus {
            outline: none;
            border-color: #f0b90b;
        }

        .chart-container {
            background: #111927;
            border-radius: 12px;
            border: 1px solid #1a2332;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .chart-container .chart-header {
            padding: 12px 20px;
            border-bottom: 1px solid #1a2332;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0d1421;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chart-container .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .chart-container .chart-title .badge {
            background: #1a2332;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            color: #6a7a8e;
            margin-left: 8px;
        }

        #klineChart {
            width: 100%;
            height: 560px;
            background: #0a0e17;
        }

        .table-wrap {
            max-height: 400px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 8px 12px;
            background: #0d1421;
            color: #6a7a8e;
            font-weight: 600;
            font-size: 11px;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        td {
            padding: 6px 12px;
            border-bottom: 1px solid #1a2332;
        }

        .up {
            color: #ff1744;
        }

        .down {
            color: #00c853;
        }

        .vol {
            color: #6a7a8e;
        }

        #tacticsTableBody tr,
        #combinedTableBody tr {
            cursor: pointer;
            transition: background 0.2s;
        }

        #tacticsTableBody tr:hover,
        #combinedTableBody tr:hover {
            background: #1a2332;
        }

        #tacticsTableBody tr.selected,
        #combinedTableBody tr.selected {
            background: #2a3a4a;
            border-left: 3px solid #f0b90b;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1421;
        }

        ::-webkit-scrollbar-thumb {
            background: #1a2332;
            border-radius: 4px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #f0b90b;
            display: none;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1a2332;
            border-top-color: #f0b90b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {

            .controls .group,
            .search-wrapper {
                min-width: 100%;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            #klineChart {
                height: 360px;
            }

            .action-bar {
                flex-direction: column;
            }

            .action-bar .log-box {
                max-height: 100px;
            }
        }

        /* 分页控件样式 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .pagination button {
            background: #0d1421;
            border: 1px solid #1a2332;
            color: #e0e0e0;
            padding: 4px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .pagination button:hover:not(:disabled) {
            background: #1a2332;
            border-color: #f0b90b;
            color: #f0b90b;
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination .page-info {
            color: #6a7a8e;
            font-size: 13px;
        }

        .pagination .page-input {
            width: 50px;
            background: #0d1421;
            border: 1px solid #1a2332;
            border-radius: 4px;
            color: #e0e0e0;
            padding: 4px 6px;
            text-align: center;
            font-size: 13px;
        }

        .pagination .page-input:focus {
            outline: none;
            border-color: #f0b90b;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div>
                <div class="sub">基于本地 DuckDB 数据库</div>
            </div>
            <div class="status" id="status">● 就绪</div>
        </div>

        <div class="controls">
            <div class="search-wrapper" style="flex:0.5;">
                <label>🔍 搜索股票</label>
                <input type="text" id="stockInput" placeholder="输入代码或名称..." autocomplete="off">
                <div class="suggestions" id="suggestions"></div>
            </div>
            <div class="group" style="flex:0.5;min-width:80px;">
                <label>📈 显示条数</label>
                <select id="limitSelect">
                    <option value="100">100</option>
                    <option value="300">300</option>
                    <option value="500" selected>500</option>
                    <option value="1000">1000</option>
                    <option value="2000">2000</option>
                </select>
            </div>
            <div class="group" style="flex:0.5;min-width:80px;">
                <label>&nbsp;</label>
                <button class="btn" id="queryBtn">🔍 查询</button>
            </div>

            <div class="group" style="flex:0.5;min-width:80px;">
                <label>&nbsp;</label>
                <button class="btn btn-secondary" id="btnLimitUp">📈涨T数据</button>
            </div>
        </div>

        <div class="controls">
            <div class="group" style="flex:0.5;min-width:120px;">
                <label>📌 单股基础U形</label>
                <input type="text" id="singleStockInput" placeholder="000060.SZ" style="width:100%;">
            </div>
            <div class="group" style="flex:0.5;min-width:80px;">
                <label>&nbsp;</label>
                <button class="btn btn-secondary" id="btnRunSingleStock">🔍单股检测</button>
            </div>
            <div class="group" style="flex:0.5;min-width:80px;">
                <label>&nbsp;</label>
                <button class="btn btn-secondary" id="btnRunCombined">🔀组合图形</button>
            </div>
            <div class="group" style="flex:0.5;min-width:80px;">
                <label>&nbsp;</label>
                <button class="btn btn-secondary" id="btnRunStrategyParallel">🔍基础U形(多线)</button>
            </div>
            <div class="group" style="flex:0.5;min-width:80px;">
                <label>&nbsp;</label>
                <button class="btn btn-secondary" id="btnRunCombinedParallel">🔀组合图形(多线)</button>
            </div>
        </div>

        <!-- 涨停列表 -->
        <div id="limitUpArea" class="hidden">
            <div class="header-row">
                <span>📈 最近12天涨T <span id="limitUpTotal" style="margin-left:15px;color:#f0b90b;font-weight:normal;">总数:
                        0</span></span>
                <button class="btn btn-sm btn-secondary" id="btnCloseLimitUp">✕ 关闭</button>
            </div>
            <div style="max-height:300px; overflow-y:auto;">
                <table style="width:100%; border-collapse:collapse; font-size:13px;">
                    <thead>
                        <tr>
                            <th>代码</th>
                            <th>名称</th>
                            <th>涨停日期</th>
                            <th>涨停价</th>
                            <th>涨跌幅</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="limitUpTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- 基础策略列表 -->
        <div id="tacticsArea" class="hidden">
            <div class="header-row">
                <span>📈 基础策略列表</span>
                <button class="btn btn-sm btn-secondary" id="btnCloseTactics">✕ 关闭</button>
            </div>
            <div style="margin-bottom:10px; display:flex; gap:10px; align-items:center;">
                <input type="text" id="tacticsSearchInput" placeholder="🔍 搜索代码..." style="flex:1;">
                <button class="btn btn-sm btn-secondary" id="btnClearTacticsSearch" style="padding:6px 16px;">✕
                    清除</button>
            </div>
            <div style="max-height:400px; overflow-y:auto;">
                <table style="width:100%; border-collapse:collapse; font-size:13px;">
                    <thead>
                        <tr>
                            <th>代码</th>
                            <th>日期</th>
                            <th>方向</th>
                            <th>k数量</th>
                            <th>U形点</th>
                            <th>价格</th>
                            <th>U背价格</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tacticsTableBody"></tbody>
                </table>
            </div>
            <!-- 分页控件 -->
            <div class="pagination" id="tacticsPagination">
                <button id="tacticsPrevPage">◀ 上一页</button>
                <span class="page-info">第 <input type="number" id="tacticsPageInput" class="page-input" value="1"

            </div>

        <!-- 组合图形列表 -->

            </div>
            <div style="margin-bottom:10px; display:flex; gap:10px; align-items:center;">
                <input type="text" id="combinedSearchInput" placeholder="🔍 搜索代码,形态类型 ..." style="flex:1;">
                <button class="btn btn-sm btn-secondary" id="btnClearCombinedSearch" style="padding:6px 16px;">✕
                    清除</button>
            </div>
            <div style="max-height:400px; overflow-y:auto;">
                <table style="width:100%; border-collapse:collapse; font-size:13px;">
                    <thead>
                        <tr>
                            <th>代码</th>
                            <th>形态类型</th>
                            <th>方向</th>
                            <th>U形价格</th>
                            <th>U形时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="combinedTableBody"></tbody>

            <!-- 分页控件 -->

                        min="1"> 页 / 共 <span id="combinedTotalPages">1</span> 页</span>
                <button id="combinedNextPage">下一页 ▶</button>

        <div class="action-bar">
            <span class="label">⚙️ 维护操作：</span>
            <button class="btn btn-sm btn-secondary" id="btnUpdateKline">📊 盘后更新K线</button>
            <button class="btn btn-sm btn-secondary" id="btnUpdateSnapshot">📸 盘中更新快照</button>
            <span style="color:#6a7a8e;font-size:11px;margin-left:8px;">执行日志：</span>
            <div class="log-box" id="logBox">就绪</div>
        </div>

        <div class="loading" id="loadingDiv">
            <div class="spinner"></div>
            <div>加载数据中...</div>
        </div>

        <div id="resultArea" class="hidden">
            <div class="chart-container">
                <div class="chart-header">
                    <div class="chart-title">
                        📊 K线图
                        <span class="badge" id="klineInfo">加载中...</span>
                    </div>
                    <div style="display:flex;gap:12px;font-size:11px;color:#6a7a8e;">
                        <span style="color:#ff1744;">● 阳线</span>
                        <span style="color:#00c853;">● 阴线</span>
                        <span style="color:#f0b90b;margin-left:8px;">⸺ 均价</span>
                    </div>
                </div>
                <div id="klineChart"></div>
            </div>

            <div class="chart-container">
                <div class="chart-header">
                    <div class="chart-title">
                        📋 数据表格
                        <span class="badge" id="tableCount">0 条</span>

                </div>

                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>开盘</th>
                                <th>最高</th>
                                <th>最低</th>
                                <th>收盘</th>
                                <th>成交量</th>

            </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script>
        let chart = null;
        let selectedStock = null;
        let currentKlineData = null;

        const stockInput = document.getElementById('stockInput');
        const suggestionsDiv = document.getElementById('suggestions');
        const queryBtn = document.getElementById('queryBtn');
        const limitSelect = document.getElementById('limitSelect');
        const logBox = document.getElementById('logBox');
        let searchTimer = null;

        // 基础策略分页相关
        let tacticsData = [];
        let tacticsCurrentPage = 1;
        let tacticsPageSize = 20;
        let tacticsFilteredData = [];

        // 组合图形分页相关
        let combinedData = [];
        let combinedCurrentPage = 1;
        let combinedPageSize = 20;
        let combinedFilteredData = [];

        function appendLog(message, type = 'info') {
            const prefix = type === 'success' ? '✅ ' : type === 'error' ? '❌ ' : 'ℹ️ ';
            const cls = type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : 'log-info';
            const line = document.createElement('div');
            line.className = cls;
            line.textContent = prefix + message;
            logBox.appendChild(line);
            logBox.scrollTop = logBox.scrollHeight;
            while (logBox.children.length > 50) logBox.removeChild(logBox.firstChild);
        }
        function clearLog() { logBox.innerHTML = ''; }

        async function runMaintenance(endpoint, button, actionName) {
            const originalText = button.textContent;
            button.disabled = true;
            button.textContent = '⏳ 执行中...';
            clearLog();
            appendLog(`开始执行 ${actionName}...`, 'info');
            try {
                const response = await fetch(endpoint, { method: 'POST' });
                const result = await response.json();
                if (result.success) {
                    appendLog(`${actionName} 执行完成！`, 'success');
                    if (result.output) {
                        const lines = result.output.split('\n').filter(s => s.trim());
                        lines.forEach(line => appendLog(line, 'info'));
                    }
                    if (result.error) appendLog('错误信息: ' + result.error, 'error');
                } else {
                    appendLog(`${actionName} 执行失败: ${result.error}`, 'error');
                }
            } catch (err) {
                appendLog(`请求失败: ${err.message}`, 'error');
            } finally {
                button.disabled = false;
                button.textContent = originalText;
            }
        }

        document.getElementById('btnUpdateKline').addEventListener('click', function (e) {
            runMaintenance('/api/update_kline', this, '盘后更新K线');
        });
        document.getElementById('btnUpdateSnapshot').addEventListener('click', function (e) {
            runMaintenance('/api/update_snapshot', this, '盘中更新快照');
        });

        // ======== 搜索逻辑 ========
        stockInput.addEventListener('input', function () {
            clearTimeout(searchTimer);
            const q = this.value.trim();
            if (q.length < 1) { suggestionsDiv.style.display = 'none'; return; }
            searchTimer = setTimeout(() => searchStocks(q), 300);
        });

        document.addEventListener('click', function (e) {
            if (!e.target.closest('.search-wrapper')) suggestionsDiv.style.display = 'none';
        });

        function searchStocks(q) {
            fetch(`/api/search_stocks?q=${encodeURIComponent(q)}`)
                .then(res => res.json())
                .then(data => {
                    suggestionsDiv.innerHTML = '';
                    if (data.length === 0) {
                        suggestionsDiv.innerHTML = '<div class="no-result">没有找到匹配的股票</div>';
                        suggestionsDiv.style.display = 'block';
                        return;
                    }
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerHTML = `<span class="code">${item.thscode}</span><span class="name">${item.name || ''}</span>`;
                        div.addEventListener('click', function () {
                            selectedStock = item;
                            stockInput.value = item.thscode + (item.name ? ' (' + item.name + ')' : '');
                            suggestionsDiv.style.display = 'none';
                            queryBtn.click();
                        });
                        suggestionsDiv.appendChild(div);
                    });

        // ======== 加载K线函数 ========
        // 加载组合图形K线
        function loadKlineWithCombined(row) {
            const symbol = row.dataset.symbol;
            const sellPrice = parseFloat(row.dataset.sellPrice);
            const sellPoint = row.dataset.sellPoint;
            const buyPoint = row.dataset.buyPoint;
            const limit = limitSelect.value;

            if (!symbol) {
                appendLog('❌ 未找到股票代码', 'error');
                return;
            }
            document.getElementById('loadingDiv').style.display = 'block';
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('status').textContent = '⏳ 加载K线...';

            fetch(`/api/kline?code=${symbol}&limit=${limit}`)
                .then(res => {
                    if (!res.ok) throw new Error('请求失败');
                    return res.json();
                })
                .then(data => {
                    console.log('🎯 U左日期:', buyPoint);

                    const markers = [];
                    // 1. 卖背水平线
                    if (!isNaN(sellPrice) && sellPrice > 0) {
                        markers.push({
                            trade_date: null,
                            price: sellPrice,
                            type: 'level',
                            label: ''
                        });
                    }
                    // 2. U左标记
                    if (buyPoint) {
                        const buyDate = buyPoint.slice(0, 10);
                        let buyRow = data.find(d => d.trade_date === buyDate);
                        if (!buyRow) {
                            const trimmedDate = buyDate.trim();
                            buyRow = data.find(d => d.trade_date.trim() === trimmedDate);
                        }
                        if (!buyRow) {
                            const targetDate = new Date(buyDate);
                            buyRow = data.find(d => {
                                const dDate = new Date(d.trade_date);
                                return dDate.getFullYear() === targetDate.getFullYear() &&
                                    dDate.getMonth() === targetDate.getMonth() &&
                                    dDate.getDate() === targetDate.getDate();
                            });
                        }
                        if (buyRow) {
                            markers.push({
                                trade_date: buyDate,
                                price: buyRow.close_price,
                                type: 'buy_point',
                                label: 'U左'
                            });
                            console.log('✅ 找到U左:', buyDate, '价格:', buyRow.close_price);
                        } else {
                            console.warn('⚠️ 未找到U左日期', buyDate, '，K线日期前10个:', data.slice(0, 10).map(d => d.trade_date));
                            appendLog(`⚠️ 未找到U左日期 ${buyDate} 的K线数据`, 'info');
                        }
                    }
                    document.getElementById('loadingDiv').style.display = 'none';
                    document.getElementById('resultArea').classList.remove('hidden');
                    document.getElementById('status').textContent = '✅ 加载完成（含组合标记）';
                    renderChart(data, markers);
                    renderTable(data);
                    document.getElementById('klineInfo').textContent = data.length + ' 根K线';
                    document.getElementById('tableCount').textContent = data.length + ' 条';
                })
                .catch(err => {
                    document.getElementById('loadingDiv').style.display = 'none';
                    document.getElementById('status').textContent = '❌ 加载失败';
                    appendLog(`❌ 加载K线失败: ${err.message}`, 'error');
                });
        }

        // 加载带策略标记的K线（基础U形）
        function loadKlineWithTactics(row) {
            const code = row.dataset.symbol;
            const datePoint = row.dataset.date;
            const uPoint = row.dataset.upoint;
            const limit = limitSelect.value;
            if (!code) {
                appendLog('❌ 未找到股票代码', 'error');
                return;
            }
            document.getElementById('loadingDiv').style.display = 'block';
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('status').textContent = '⏳ 加载K线...';
            let url = `/api/kline_with_tactics?code=${code}&limit=${limit}`;
            if (datePoint) url += `&date_point=${datePoint}`;
            if (uPoint) url += `&u_point=${uPoint}`;
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error('请求失败');
                    return res.json();
                })
                .then(result => {
                    document.getElementById('loadingDiv').style.display = 'none';
                    document.getElementById('resultArea').classList.remove('hidden');
                    document.getElementById('status').textContent = `✅ 加载完成（含策略标记）`;
                    renderChart(result.data, result.markers);
                    renderTable(result.data);
                    document.getElementById('klineInfo').textContent = result.data.length + ' 根K线';
                    document.getElementById('tableCount').textContent = result.data.length + ' 条';
                })
                .catch(err => {
                    document.getElementById('loadingDiv').style.display = 'none';
                    document.getElementById('status').textContent = '❌ 加载失败';
                    appendLog(`❌ 加载K线失败: ${err.message}`, 'error');
                });
        }

        // ======== 图表渲染 ========
        function renderChart(data, markers) {
            const container = document.getElementById('klineChart');
            if (!chart) {
                chart = echarts.init(container);
                window.addEventListener('resize', () => chart && chart.resize());
            }

            data.sort((a, b) => new Date(a.trade_date) - new Date(b.trade_date));

            const dates = data.map(d => {
                let dateStr = d.trade_date;
                if (dateStr && dateStr.length > 10) dateStr = dateStr.slice(0, 10);
                return dateStr.trim();
            });
            const kValues = data.map(d => [d.open_price, d.close_price, d.low_price, d.high_price]);
            const volumes = data.map(d => d.volume);
            const maxVolume = Math.max(...volumes, 1);

            const markPoints = [];
            let levelLinePrice = null;
            if (markers && markers.length > 0) {
                markers.forEach(m => {
                    if (m.type === 'level') {
                        levelLinePrice = m.price;
                        return;
                    }
                    let markerDate = m.trade_date;
                    if (markerDate && markerDate.length > 10) markerDate = markerDate.slice(0, 10);
                    markerDate = markerDate.trim();
                    const idx = dates.findIndex(d => d === markerDate);
                    if (idx !== -1) {
                        let color, label, symbolSize = 30;
                        if (m.type === 'date') {
                            color = '#ff5722';
                            label = '策略日';
                        } else if (m.type === 'u_point') {
                            color = '#2196f3';
                            label = 'U形点';
                        } else if (m.type === 'buy_point') {
                            color = '#4caf50';
                            label = 'U左';
                            symbolSize = 30;
                        } else {
                            color = '#f0b90b';
                            label = '涨停';
                            symbolSize = 20;
                        }
                        markPoints.push({
                            coord: [idx, m.price],
                            symbol: 'pin',
                            symbolSize: symbolSize,
                            itemStyle: { color: color },
                            label: {
                                show: true,
                                formatter: label,
                                color: '#fff',
                                fontSize: 10,
                                fontWeight: 'bold',
                                position: 'top'
                            }
                        });
                    }
                });
            }

            const markLineData = [];
            if (levelLinePrice !== null && !isNaN(levelLinePrice) && levelLinePrice > 0) {
                markLineData.push({
                    yAxis: levelLinePrice,
                    label: {
                        formatter: levelLinePrice.toFixed(2),
                        color: '#ffffff',
                        position: 'start'
                    },
                    lineStyle: { color: '#ffffff', type: 'solid', width: 2 }
                });
            }

            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' },
                    formatter: function (params) {
                        const idx = params[0].dataIndex;
                        const d = data[idx];
                        if (!d) return '';
                        let html = `<div style="font-weight:600;">${d.trade_date}</div>
                    开盘: ${d.open_price}<br>
                    最高: ${d.high_price}<br>
                    最低: ${d.low_price}<br>
                    收盘: ${d.close_price}<br>
                    成交量: ${d.volume}<br>
                    涨跌幅: ${d.pct_chg ? d.pct_chg.toFixed(2) : '0.00'}%`;
                        if (markers) {
                            const marker = markers.find(m => m.trade_date === d.trade_date);
                            if (marker && marker.type !== 'level') {
                                html += `<br><span style="color:${marker.type === 'date' ? '#ff5722' : '#2196f3'};">🔺 ${marker.label}</span>`;
                            }
                        }
                        return html;
                    }
                },
                dataZoom: [
                    { type: 'inside', start: 0, end: 100, minSpan: 5, maxSpan: 100 },
                    {
                        type: 'slider', start: 0, end: 100, minSpan: 5, maxSpan: 100, height: 20, bottom: 5,
                        borderColor: '#1a2332', fillerColor: 'rgba(240,185,11,0.15)',
                        handleStyle: { color: '#f0b90b' }, textStyle: { color: '#6a7a8e' }, xAxisIndex: [0, 1]
                    }
                ],
                grid: [
                    { left: '6%', right: '6%', top: '8%', height: '58%' },
                    { left: '6%', right: '6%', top: '70%', height: '18%' }
                ],
                xAxis: [
                    {
                        type: 'category', data: dates, scale: true,
                        axisLabel: { color: '#6a7a8e', interval: Math.floor(dates.length / 20) },
                        axisLine: { lineStyle: { color: '#1a2332' } }, gridIndex: 0
                    },
                    {
                        type: 'category', data: dates, scale: true,
                        axisLabel: { show: false }, axisLine: { show: false }, gridIndex: 1
                    }
                ],
                yAxis: [
                    {
                        scale: true, splitLine: { lineStyle: { color: '#0d1421' } },
                        axisLabel: { color: '#6a7a8e' }, gridIndex: 0
                    },
                    {
                        scale: true, splitLine: { lineStyle: { color: '#0d1421' } },
                        axisLabel: { color: '#6a7a8e' }, gridIndex: 1, min: 0, max: maxVolume * 1.2
                    }
                ],
                series: [{
                    name: 'K线',
                    type: 'candlestick',
                    data: kValues,
                    xAxisIndex: 0,
                    yAxisIndex: 0,
                    itemStyle: {
                        color: '#ff1744',
                        color0: '#00c853',
                        borderColor: '#ff1744',
                        borderColor0: '#00c853',
                    },
                    markPoint: {
                        data: markPoints,
                        symbol: 'pin',
                        symbolSize: 30,
                        itemStyle: { color: '#f0b90b' },
                        label: {
                            show: true,
                            formatter: function (params) { return params.data.label; },
                            color: '#fff',
                            fontSize: 10,
                            fontWeight: 'bold',
                            position: 'top'
                        }
                    },
                    markLine: {
                        silent: true,
                        data: markLineData,
                        label: {
                            fontSize: 10,
                            color: '#ffffff'
                        }
                    }
                }, {
                    name: '成交量',
                    type: 'bar',
                    data: volumes,
                    xAxisIndex: 1,
                    yAxisIndex: 1,
                    barWidth: '60%',
                    itemStyle: {
                        color: function (params) {
                            const idx = params.dataIndex;
                            return data[idx].close_price >= data[idx].open_price ? '#ff174466' : '#00c85366';
                        }
                    }
                }]
            };

            chart.setOption(option);
            setTimeout(() => chart && chart.resize(), 200);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#6a7a8e;padding:20px;">暂无数据</td></tr>';
                return;
            }
            const sorted = [...data].reverse();
            tbody.innerHTML = sorted.map(d => {
                const pct = d.pct_chg || 0;
                const cls = pct > 0 ? 'up' : (pct < 0 ? 'down' : '');
                return `<tr>
                    <td>${d.trade_date}</td>
                    <td>${d.open_price}</td>
                    <td>${d.high_price}</td>
                    <td>${d.low_price}</td>
                    <td>${d.close_price}</td>
                    <td class="vol">${d.volume}</td>
                    <td class="${cls}">${pct > 0 ? '+' : ''}${pct.toFixed(2)}%</td>
                </tr>`;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', function () {
            stockInput.focus();
            clearLog();
            appendLog('系统就绪', 'info');
        });
    </script>
</body>
